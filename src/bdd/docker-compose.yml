version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: senate_db
    environment:
      POSTGRES_USER: senate_user
      POSTGRES_PASSWORD: senate_pass
      POSTGRES_DB: senate_db
    ports:
      - "5433:5432"
    volumes:
      - senate_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./insert_representatives.sql:/docker-entrypoint-initdb.d/02-insert_representatives.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U senate_user -d senate_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  senate_postgres_data:
